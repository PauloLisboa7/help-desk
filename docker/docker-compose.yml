version: '3.9'

services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk-postgres
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_password
      POSTGRES_DB: helpdesk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: helpdesk-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: helpdesk
      DB_PASSWORD: helpdesk_password
      DB_NAME: helpdesk_db
      JWT_SECRET: seu_jwt_secret_super_seguro
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - helpdesk-network
    restart: unless-stopped

  # Nginx (Proxy Reverso / Servir Static)
  nginx:
    image: nginx:alpine
    container_name: helpdesk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - helpdesk-network
    restart: unless-stopped

  # pgAdmin (Gerenciamento de PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: helpdesk-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - helpdesk-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  helpdesk-network:
    driver: bridge
