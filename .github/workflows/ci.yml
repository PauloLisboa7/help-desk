name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
        node-version: [18]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r django_admin/requirements.txt

      - name: Install Node deps
        run: |
          npm ci

      - name: Run backend checks
        run: |
          # Rodar checagens rápidas (sem testes pesados)
          python django_admin/manage.py check || true

      - name: Run linters
        run: |
          npm run lint || true
